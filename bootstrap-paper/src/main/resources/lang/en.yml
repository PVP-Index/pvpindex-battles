setup:
  separator: "&8&m------------------------------------------------"
  title: "&c&l  PvPIndex Battles - First-time Setup"
  step1_heading: "&e  Step 1 - API Key"
  step1_desc: "&7  Edit &fplugins/PvPIndexBattles/config.yml&7 and fill in:"
  step1_yaml_key: "&3  api:"
  step1_yaml_value: "&b    api_key: &f<paste-your-api-key-here>"
  step1_token_info: "&7  Your API key is a long token starting with &f1|&7 or &f2|&7."
  step1_howto: "&7  To get one:"
  step1_apply: "&7    1. Go to &bhttps://pvpindex.com/apply&7 and submit a server application."
  step1_wait: "&7    2. Wait for an admin to approve it. You will receive the key by email"
  step1_wait2: "&7       and can also view or rotate it at &bhttps://pvpindex.com/servers/<slug>&7."
  step2_heading: "&e  Step 2 - Arena Templates"
  step2_desc: "&7  Copy a world folder or .json schematic into:"
  step2_path: "&f    plugins/PvPIndexBattles/templates/"
  step2_register: "&7  Then register it in &ftemplates.yml&7 (two strategies available):"
  step2_copy: "&f    strategy: copy       &8# world folder in templates/"
  step2_schematic: "&f    strategy: schematic  &8# .json schematic pasted into host world"
  step3_heading: "&e  Step 3 - Reload"
  step3_desc: "&7  Run &f/pvpindex reload&7 to apply all changes."
  step3_hint: "&7  Players can then use &f/battle&7 to open the battle-mode queue GUI."

