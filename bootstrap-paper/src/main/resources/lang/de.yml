setup:
  separator: "&8&m------------------------------------------------"
  title: "&c&l  PvPIndex Battles - Ersteinrichtung"
  step1_heading: "&e  Schritt 1 - API-Schluessel"
  step1_desc: "&7  Bearbeite &fplugins/PvPIndexBattles/config.yml&7 und trage ein:"
  step1_yaml_key: "&3  api:"
  step1_yaml_value: "&b    api_key: &f<deinen-api-schluessel-hier-einfuegen>"
  step1_token_info: "&7  Dein API-Schluessel ist ein langer Token der mit &f1|&7 oder &f2|&7 beginnt."
  step1_howto: "&7  So bekommst du einen:"
  step1_apply: "&7    1. Gehe zu &bhttps://pvpindex.com/apply&7 und reiche eine Serveranfrage ein."
  step1_wait: "&7    2. Warte auf die Genehmigung eines Admins. Du erhaeltst den Schluessel per E-Mail"
  step1_wait2: "&7       und kannst ihn auch unter &bhttps://pvpindex.com/servers/<slug>&7 einsehen oder rotieren."
  step2_heading: "&e  Schritt 2 - Arena-Vorlagen"
  step2_desc: "&7  Kopiere einen Weltordner oder .json-Schematic nach:"
  step2_path: "&f    plugins/PvPIndexBattles/templates/"
  step2_register: "&7  Registriere es dann in &ftemplates.yml&7 (zwei Strategien verfuegbar):"
  step2_copy: "&f    strategy: copy       &8# Weltordner in templates/"
  step2_schematic: "&f    strategy: schematic  &8# .json-Schematic in Hauptwelt eingefuegt"
  step3_heading: "&e  Schritt 3 - Neu laden"
  step3_desc: "&7  Fuehre &f/pvpindex reload&7 aus um alle Aenderungen anzuwenden."
  step3_hint: "&7  Spieler koennen dann &f/battle&7 verwenden um die Kampfmodus-GUI zu oeffnen."

