setup:
  separator: "&8&m------------------------------------------------"
  title: "&c&l  PvPIndex Battles - Pierwsza konfiguracja"
  step1_heading: "&e  Krok 1 - Klucz API"
  step1_desc: "&7  Edytuj &fplugins/PvPIndexBattles/config.yml&7 i uzupelnij:"
  step1_yaml_key: "&3  api:"
  step1_yaml_value: "&b    api_key: &f<wklej-swoj-klucz-api-tutaj>"
