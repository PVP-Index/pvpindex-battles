  step1_wait: "&7    2. Poczekaj na zatwierdzenie przez admina. Klucz otrzymasz mailem"
  step1_wait2: "&7       i mozesz go tez zobaczyc lub zmienic na &bhttps://pvpindex.com/servers/<slug>&7."
  step2_heading: "&e  Krok 2 - Szablony aren"
  step2_desc: "&7  Skopiuj folder swiata lub .json schematic do:"
  step2_path: "&f    plugins/PvPIndexBattles/templates/"
  step2_register: "&7  Nastepnie zarejestruj go w &ftemplates.yml&7 (dwie strategie dostepne):"
