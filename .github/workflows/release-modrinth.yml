name: Release to Modrinth

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write   # Required to create GitHub Releases

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # JDK 25 is required to compile the Paper 26.1.x adapter module.
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      - name: Build (skip tests for release speed)
        run: mvn clean package -B -DskipTests

      # ── Locate artifacts ─────────────────────────────────────────────────────
      - name: Locate JARs
        id: jars
        run: |
          PAPER=$(ls bootstrap-paper/target/PvPIndexBattles-*.jar | grep -v 'original' | head -1)
          VELOCITY=$(ls bootstrap-velocity/target/PvPIndexBattles-velocity-*.jar | grep -v 'original' | head -1)
          echo "paper=$PAPER"     >> "$GITHUB_OUTPUT"
          echo "velocity=$VELOCITY" >> "$GITHUB_OUTPUT"

      # ── Extract version (strip leading 'v') ───────────────────────────────────
      - name: Extract version
        id: meta
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      # ── Extract changelog section for this tag from CHANGELOG.md ───────────
      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          # Grab lines between the version header and the next '## [' header (exclusive).
          NOTES=$(awk \
            "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md | sed '/^[[:space:]]*$/d' | sed '/^###/!b; s/^### /\n### /')
          if [[ -z "$NOTES" ]]; then
            NOTES="See [CHANGELOG.md](https://github.com/PVP-Index/plugin/blob/main/CHANGELOG.md) for details."
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── GitHub Release ───────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.ref }}
          name: "PvPIndex Battles ${{ steps.meta.outputs.ref }}"
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.notes }}

            ---

            ### Downloads
            | JAR | Target |
            |-----|--------|
            | `PvPIndexBattles-${{ steps.meta.outputs.version }}.jar` | Paper 1.21.x / 1.21.4+ |
            | `PvPIndexBattles-velocity-${{ steps.meta.outputs.version }}.jar` | Velocity 3.x |

            Full documentation: https://github.com/PVP-Index/plugin/tree/main/docs
          files: |
            ${{ steps.jars.outputs.paper }}
            ${{ steps.jars.outputs.velocity }}
          fail_on_unmatched_files: true

      # ── Modrinth — Paper JAR ─────────────────────────────────────────────────
      - name: Upload Paper JAR to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          PAPER_JAR="${{ steps.jars.outputs.paper }}"
          PAPER_FILENAME=$(basename "$PAPER_JAR")
          VERSION="${{ steps.meta.outputs.version }}"
          CHANGELOG=$(cat << 'ENDOFCHANGELOG'
          ${{ steps.changelog.outputs.notes }}
          ENDOFCHANGELOG
          )

          # Build the JSON payload in Python so shell quoting never corrupts it.
          VERSION="$VERSION" CHANGELOG="$CHANGELOG" python3 -c "import json,os; v=os.environ['VERSION']; c=os.environ['CHANGELOG']; print(json.dumps({'name':f'PvPIndex Battles {v} (Paper)','version_number':f'{v}-paper','changelog':c,'dependencies':[],'game_versions':['1.21','1.21.1','1.21.2','1.21.3','1.21.4','1.21.5','1.21.6','1.21.7','1.21.8','1.21.9','1.21.10','1.21.11','26.1','26.1.1','26.1.2'],'version_type':'release','loaders':['paper','folia','purpur','spigot','bukkit'],'featured':True,'project_id':'wOZtwr2V','primary_file':'paper_jar','file_parts':['paper_jar']}))" > /tmp/modrinth_paper_payload.json

          HTTP_CODE=$(curl -s -o /tmp/modrinth_paper.json -w '%{http_code}' \
            --retry 3 --retry-delay 10 --retry-all-errors \
            -X POST https://api.modrinth.com/v2/version \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data=</tmp/modrinth_paper_payload.json" \
            -F "paper_jar=@${PAPER_JAR};filename=${PAPER_FILENAME}")
          echo "Modrinth response (HTTP $HTTP_CODE):"
          cat /tmp/modrinth_paper.json
          [[ "$HTTP_CODE" =~ ^2 ]] || exit 1

      # ── Modrinth — Velocity JAR ──────────────────────────────────────────────
      - name: Upload Velocity JAR to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          VELOCITY_JAR="${{ steps.jars.outputs.velocity }}"
          VELOCITY_FILENAME=$(basename "$VELOCITY_JAR")
          VERSION="${{ steps.meta.outputs.version }}"
          CHANGELOG=$(cat << 'ENDOFCHANGELOG'
          ${{ steps.changelog.outputs.notes }}
          ENDOFCHANGELOG
          )

          # Build the JSON payload in Python so shell quoting never corrupts it.
          VERSION="$VERSION" CHANGELOG="$CHANGELOG" python3 -c "import json,os; v=os.environ['VERSION']; c=os.environ['CHANGELOG']; print(json.dumps({'name':f'PvPIndex Battles {v} (Velocity)','version_number':f'{v}-velocity','changelog':c,'dependencies':[],'game_versions':['1.21','1.21.1','1.21.2','1.21.3','1.21.4','1.21.5','1.21.6','1.21.7','1.21.8','1.21.9','1.21.10','1.21.11','26.1','26.1.1','26.1.2'],'version_type':'release','loaders':['velocity','bungeecord'],'featured':False,'project_id':'wOZtwr2V','primary_file':'velocity_jar','file_parts':['velocity_jar']}))" > /tmp/modrinth_velocity_payload.json

          HTTP_CODE=$(curl -s -o /tmp/modrinth_velocity.json -w '%{http_code}' \
            --retry 3 --retry-delay 10 --retry-all-errors \
            -X POST https://api.modrinth.com/v2/version \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data=</tmp/modrinth_velocity_payload.json" \
            -F "velocity_jar=@${VELOCITY_JAR};filename=${VELOCITY_FILENAME}")
          echo "Modrinth response (HTTP $HTTP_CODE):"
          cat /tmp/modrinth_velocity.json
          [[ "$HTTP_CODE" =~ ^2 ]] || exit 1
