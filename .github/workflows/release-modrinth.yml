name: Release to Modrinth

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  RELEASE PIPELINE
#
#  1. Build          - compile all modules with JDK 25
#  2. Locate JARs    - find the shaded Paper, Velocity & BungeeCord artifacts
#  3. Extract info   - version string + changelog from CHANGELOG.md
#  4. GitHub Release - create the GH release with all JARs attached
#  5. Modrinth       - upload Paper, Velocity & BungeeCord JARs (skips duplicates)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

jobs:
  release:
    runs-on: ubuntu-latest

    steps:

      # ────────────────────────────────────────────────────────────────────────
      #  1. CHECKOUT & BUILD
      # ────────────────────────────────────────────────────────────────────────

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      - name: Build all modules
        run: mvn clean package -B -DskipTests

      # ────────────────────────────────────────────────────────────────────────
      #  2. LOCATE ARTIFACTS
      # ────────────────────────────────────────────────────────────────────────

      - name: Locate shaded JARs
        id: jars
        run: |
          PAPER=$(ls bootstrap-paper/target/PvPIndexBattles-*.jar | grep -v 'original' | head -1)
          VELOCITY=$(ls bootstrap-velocity/target/PvPIndexBattles-velocity-*.jar | grep -v 'original' | head -1)
          BUNGEECORD=$(ls bootstrap-bungeecord/target/PvPIndexBattles-bungeecord-*.jar | grep -v 'original' | head -1)
          echo "paper=$PAPER"           >> "$GITHUB_OUTPUT"
          echo "velocity=$VELOCITY"     >> "$GITHUB_OUTPUT"
          echo "bungeecord=$BUNGEECORD" >> "$GITHUB_OUTPUT"

      # ────────────────────────────────────────────────────────────────────────
      #  3. EXTRACT VERSION & CHANGELOG
      # ────────────────────────────────────────────────────────────────────────

      - name: Extract version from tag
        id: meta
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "ref=${REF}"           >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}"     >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          NOTES=$(awk \
            "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md | sed '/^[[:space:]]*$/d' | sed '/^###/!b; s/^### /\n### /')
          if [[ -z "$NOTES" ]]; then
            NOTES="See [CHANGELOG.md](https://github.com/PVP-Index/plugin/blob/main/CHANGELOG.md) for details."
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ────────────────────────────────────────────────────────────────────────
      #  4. GITHUB RELEASE
      # ────────────────────────────────────────────────────────────────────────

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.ref }}
          name: "PvPIndex Battles ${{ steps.meta.outputs.ref }}"
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.notes }}

            ---

            ### Downloads
            | JAR | Target |
            |-----|--------|
            | `PvPIndexBattles-${{ steps.meta.outputs.version }}.jar` | Paper 1.21.x / 1.21.4+ |
            | `PvPIndexBattles-velocity-${{ steps.meta.outputs.version }}.jar` | Velocity 3.x |
            | `PvPIndexBattles-bungeecord-${{ steps.meta.outputs.version }}.jar` | BungeeCord / Waterfall |

            Full documentation: https://github.com/PVP-Index/plugin/tree/main/docs
          files: |
            ${{ steps.jars.outputs.paper }}
            ${{ steps.jars.outputs.velocity }}
            ${{ steps.jars.outputs.bungeecord }}
          fail_on_unmatched_files: true

      # ────────────────────────────────────────────────────────────────────────
      #  5a. MODRINTH  - PAPER JAR
      #
      #  Loaders : paper, folia, purpur, spigot, bukkit
      #  Skips   : if this version was already uploaded
      # ────────────────────────────────────────────────────────────────────────

      - name: Upload Paper JAR to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          PAPER_JAR="${{ steps.jars.outputs.paper }}"
          PAPER_FILENAME=$(basename "$PAPER_JAR")
          VERSION="${{ steps.meta.outputs.version }}"

          CHANGELOG=$(cat << 'ENDOFCHANGELOG'
          ${{ steps.changelog.outputs.notes }}
          ENDOFCHANGELOG
          )

          VERSION="$VERSION" CHANGELOG="$CHANGELOG" python3 -c "
          import json, os
          v = os.environ['VERSION']
          c = os.environ['CHANGELOG']
          print(json.dumps({
              'name':          f'PvPIndex Battles {v} (Paper)',
              'version_number': f'{v}-paper',
              'changelog':     c,
              'dependencies':  [
                  {'project_id': '2NJKwgXC', 'version_id': None, 'dependency_type': 'optional'}
              ],
              'game_versions': [
                  '1.21','1.21.1','1.21.2','1.21.3','1.21.4','1.21.5',
                  '1.21.6','1.21.7','1.21.8','1.21.9','1.21.10','1.21.11',
                  '26.1','26.1.1','26.1.2'
              ],
              'version_type':  'release',
              'loaders':       ['paper','folia','purpur','spigot','bukkit'],
              'featured':      True,
              'project_id':    'oRvmxM8N',
              'primary_file':  'paper_jar',
              'file_parts':    ['paper_jar']
          }))" > /tmp/modrinth_paper_payload.json

          HTTP_CODE=$(curl -s -o /tmp/modrinth_paper.json -w '%{http_code}' \
            --retry 3 --retry-delay 10 --retry-all-errors \
            -X POST https://api.modrinth.com/v2/version \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data=</tmp/modrinth_paper_payload.json" \
            -F "paper_jar=@${PAPER_JAR};filename=${PAPER_FILENAME}")

          echo "Modrinth response (HTTP $HTTP_CODE):"
          cat /tmp/modrinth_paper.json
          echo ""

          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "Paper JAR uploaded successfully."
          elif grep -q 'already exists' /tmp/modrinth_paper.json 2>/dev/null; then
            echo "Paper version already exists on Modrinth  - skipping."
          else
            echo "Paper upload failed!"
            exit 1
          fi

      # ────────────────────────────────────────────────────────────────────────
      #  5b. MODRINTH  - VELOCITY JAR
      #
      #  Loaders : velocity (only  - do NOT include bungeecord here,
      #            Modrinth rejects JARs missing bungee.yml for that loader)
      #  Skips   : if this version was already uploaded
      # ────────────────────────────────────────────────────────────────────────

      - name: Upload Velocity JAR to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          VELOCITY_JAR="${{ steps.jars.outputs.velocity }}"
          VELOCITY_FILENAME=$(basename "$VELOCITY_JAR")
          VERSION="${{ steps.meta.outputs.version }}"

          CHANGELOG=$(cat << 'ENDOFCHANGELOG'
          ${{ steps.changelog.outputs.notes }}
          ENDOFCHANGELOG
          )

          VERSION="$VERSION" CHANGELOG="$CHANGELOG" python3 -c "
          import json, os
          v = os.environ['VERSION']
          c = os.environ['CHANGELOG']
          print(json.dumps({
              'name':          f'PvPIndex Battles {v} (Velocity)',
              'version_number': f'{v}-velocity',
              'changelog':     c,
              'dependencies':  [],
              'game_versions': [
                  '1.21','1.21.1','1.21.2','1.21.3','1.21.4','1.21.5',
                  '1.21.6','1.21.7','1.21.8','1.21.9','1.21.10','1.21.11',
                  '26.1','26.1.1','26.1.2'
              ],
              'version_type':  'release',
              'loaders':       ['velocity'],
              'featured':      False,
              'project_id':    'wOZtwr2V',
              'primary_file':  'velocity_jar',
              'file_parts':    ['velocity_jar']
          }))" > /tmp/modrinth_velocity_payload.json

          HTTP_CODE=$(curl -s -o /tmp/modrinth_velocity.json -w '%{http_code}' \
            --retry 3 --retry-delay 10 --retry-all-errors \
            -X POST https://api.modrinth.com/v2/version \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data=</tmp/modrinth_velocity_payload.json" \
            -F "velocity_jar=@${VELOCITY_JAR};filename=${VELOCITY_FILENAME}")

          echo "Modrinth response (HTTP $HTTP_CODE):"
          cat /tmp/modrinth_velocity.json
          echo ""

          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "Velocity JAR uploaded successfully."
          elif grep -q 'already exists' /tmp/modrinth_velocity.json 2>/dev/null; then
            echo "Velocity version already exists on Modrinth  - skipping."
          else
            echo "Velocity upload failed!"
            exit 1
          fi

      # ────────────────────────────────────────────────────────────────────────
      #  5c. MODRINTH  - BUNGEECORD JAR
      #
      #  Loaders : bungeecord, waterfall
      #  Skips   : if this version was already uploaded
      # ────────────────────────────────────────────────────────────────────────

      - name: Upload BungeeCord JAR to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          BUNGEE_JAR="${{ steps.jars.outputs.bungeecord }}"
          BUNGEE_FILENAME=$(basename "$BUNGEE_JAR")
          VERSION="${{ steps.meta.outputs.version }}"

          CHANGELOG=$(cat << 'ENDOFCHANGELOG'
          ${{ steps.changelog.outputs.notes }}
          ENDOFCHANGELOG
          )

          VERSION="$VERSION" CHANGELOG="$CHANGELOG" python3 -c "
          import json, os
          v = os.environ['VERSION']
          c = os.environ['CHANGELOG']
          print(json.dumps({
              'name':          f'PvPIndex Battles {v} (BungeeCord)',
              'version_number': f'{v}-bungeecord',
              'changelog':     c,
              'dependencies':  [],
              'game_versions': [
                  '1.21','1.21.1','1.21.2','1.21.3','1.21.4','1.21.5',
                  '1.21.6','1.21.7','1.21.8','1.21.9','1.21.10','1.21.11',
                  '26.1','26.1.1','26.1.2'
              ],
              'version_type':  'release',
              'loaders':       ['bungeecord','waterfall'],
              'featured':      False,
              'project_id':    'wOZtwr2V',
              'primary_file':  'bungee_jar',
              'file_parts':    ['bungee_jar']
          }))" > /tmp/modrinth_bungee_payload.json

          HTTP_CODE=$(curl -s -o /tmp/modrinth_bungee.json -w '%{http_code}' \
            --retry 3 --retry-delay 10 --retry-all-errors \
            -X POST https://api.modrinth.com/v2/version \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data=</tmp/modrinth_bungee_payload.json" \
            -F "bungee_jar=@${BUNGEE_JAR};filename=${BUNGEE_FILENAME}")

          echo "Modrinth response (HTTP $HTTP_CODE):"
          cat /tmp/modrinth_bungee.json
          echo ""

          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "BungeeCord JAR uploaded successfully."
          elif grep -q 'already exists' /tmp/modrinth_bungee.json 2>/dev/null; then
            echo "BungeeCord version already exists on Modrinth  - skipping."
          else
            echo "BungeeCord upload failed!"
            exit 1
          fi
