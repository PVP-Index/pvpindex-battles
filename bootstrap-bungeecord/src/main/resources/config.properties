# PvPIndex BungeeCord Proxy Plugin - Configuration
# ==================================================
#
# This file configures the PvPIndex proxy plugin. Place it in:
#   <bungeecord-root>/plugins/PvPIndex-Proxy/config.properties

# Shared secret used to authenticate plugin channel messages from Paper backends.
# Must match 'proxy.secret' in each Paper backend's config.yml.
# Leave empty to disable message authentication (not recommended for production).
paper_secret=

# Comma-separated list of backend server names to monitor for battle messages.
# Leave empty to monitor ALL servers registered on this proxy.
# Example: monitored_servers=lobby,eu,usa,practice
monitored_servers=

# Enable verbose debug logging.
debug=false

# =============================================================================
# Multi-Proxy Network (optional)
# =============================================================================
# Enable cross-proxy communication via Redis. When disabled, the plugin behaves
# exactly as a single-proxy setup (backward compatible).

# Enable the multi-proxy network layer.
network.enabled=false

# Unique ID for this proxy instance. Must be different on each Velocity/BungeeCord proxy.
network.proxy_id=bungee-1

# Region label for this proxy (informational, used in status commands).
network.region=default

# Redis connection settings for cross-proxy messaging.
network.redis.host=localhost
network.redis.port=6379
network.redis.password=
network.redis.database=0
network.redis.pool_size=8

# Reconnect interval (seconds) when Redis connection is lost.
network.reconnect_interval=5

# Maximum age (seconds) for a network message before it is discarded.
network.message_timeout=10

# Interval (seconds) between heartbeat broadcasts to other proxies.
network.heartbeat_interval=15

# Time (seconds) after which a proxy with no heartbeat is considered offline.
network.proxy_timeout=45

# Cross-proxy battle transfer strategy.
# Options: transfer_packet (MC 1.20.5+ transfer), shared_server, both
network.transfer_strategy=shared_server

# Comma-separated list of backend servers shared across all proxies.
network.shared_battle_servers=
